<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фитнес-клуб — Управление</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4f46e5;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9fafb;
        }
        tr:hover {
            background-color: #eef2ff;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-4">
    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Шапка -->
        <div class="bg-indigo-600 text-white p-6">
            <h1 class="text-3xl font-bold text-center">Система управления фитнес‑клубом</h1>
            <p class="text-center mt-2 opacity-90">Добавляйте, изменяйте и удаляйте карточки посетителей</p>
        </div>

        <!-- Основной контент -->
        <div class="p-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Левая колонка: форма ввода -->
                <div class="space-y-6">
                    <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                        <h2 class="text-xl font-semibold text-gray-800 mb-4">Данные участника</h2>
                        <div class="space-y-4">
                            <!-- ID -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">ID</label>
                                <input type="number" id="member-id" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="Например, 101">
                            </div>
                            <!-- Имя -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Имя</label>
                                <input type="text" id="member-name" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="Иван Иванов">
                            </div>
                            <!-- Возраст -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Возраст</label>
                                <input type="number" id="member-age" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="25">
                            </div>
                            <!-- Тип абонемента -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Абонемент</label>
                                <select id="member-membership" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
                                    <option value="Monthly">Месячный</option>
                                    <option value="Quarterly">Квартальный</option>
                                    <option value="Yearly">Годовой</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Кнопки действий -->
                    <div class="flex flex-wrap gap-3">
                        <button id="add-btn" class="px-6 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-md shadow-md transition duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50">
                            Добавить
                        </button>
                        <button id="update-btn" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-md shadow-md transition duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                            Обновить
                        </button>
                        <button id="delete-btn" class="px-6 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-md shadow-md transition duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50">
                            Удалить
                        </button>
                        <button id="clear-btn" class="px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-md shadow-md transition duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-opacity-50">
                            Очистить поля
                        </button>
                    </div>
                </div>

                <!-- Правая колонка: таблица участников -->
                <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Список посетителей</h2>
                    <div class="overflow-x-auto" style="max-height: 350px; overflow-y: auto;">
                        <table id="members-table" class="min-w-full bg-white rounded-lg">
                            <thead>
                                <tr>
                                    <th class="px-4 py-2">ID</th>
                                    <th class="px-4 py-2">Имя</th>
                                    <th class="px-4 py-2">Возраст</th>
                                    <th class="px-4 py-2">Абонемент</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <!-- Строки будут добавляться динамически -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Подвал -->
        <div class="bg-gray-100 p-4 text-center text-gray-600 text-sm">
            <p>Управляйте данными прямо в браузере — просто, как Java Swing, только веб</p>
        </div>
    </div>

    <script>
        // Массив, хранящий всех членов клуба (аналог ArrayList)
        let members = [];

        // Элементы DOM
        const idInput = document.getElementById('member-id');
        const nameInput = document.getElementById('member-name');
        const ageInput = document.getElementById('member-age');
        const membershipSelect = document.getElementById('member-membership');
        const tableBody = document.getElementById('table-body');

        // Функция отрисовки таблицы
        function renderTable() {
            tableBody.innerHTML = '';
            members.forEach((member, index) => {
                const row = document.createElement('tr');
                row.classList.add('hover:bg-indigo-50', 'cursor-pointer');
                row.setAttribute('data-index', index);
                row.innerHTML = `
                    <td class="px-4 py-2">${member.id}</td>
                    <td class="px-4 py-2">${member.name}</td>
                    <td class="px-4 py-2">${member.age}</td>
                    <td class="px-4 py-2">${member.membership}</td>
                `;
                // При клике на строку заполняем поля формы
                row.addEventListener('click', () => fillForm(index));
                tableBody.appendChild(row);
            });
        }

        // Заполнить форму данными выбранного участника
        function fillForm(index) {
            const member = members[index];
            idInput.value = member.id;
            nameInput.value = member.name;
            ageInput.value = member.age;
            membershipSelect.value = member.membership;
            // Блокируем ID, чтобы не меняли (как в Swing)
            idInput.disabled = true;
        }

        // Очистить поля и разблокировать ID
        function clearForm() {
            idInput.value = '';
            nameInput.value = '';
            ageInput.value = '';
            membershipSelect.selectedIndex = 0;
            idInput.disabled = false;
        }

        // Добавление участника
        document.getElementById('add-btn').addEventListener('click', () => {
            const id = parseInt(idInput.value.trim());
            const name = nameInput.value.trim();
            const age = parseInt(ageInput.value.trim());
            const membership = membershipSelect.value;

            // Валидация
            if (!id || !name || !age || isNaN(id) || isNaN(age)) {
                alert('Пожалуйста, заполните все поля корректно!');
                return;
            }

            // Проверка уникальности ID (как в Java)
            if (members.some(m => m.id === id)) {
                alert('Участник с таким ID уже существует!');
                return;
            }

            members.push({ id, name, age, membership });
            renderTable();
            clearForm();
            alert('Участник успешно добавлен!');
        });

        // Обновление участника
        document.getElementById('update-btn').addEventListener('click', () => {
            const id = parseInt(idInput.value.trim());
            const name = nameInput.value.trim();
            const age = parseInt(ageInput.value.trim());
            const membership = membershipSelect.value;

            if (!id || !name || !age || isNaN(id) || isNaN(age)) {
                alert('Пожалуйста, заполните все поля корректно!');
                return;
            }

            // Найти индекс по ID (поиск по массиву)
            const index = members.findIndex(m => m.id === id);
            if (index === -1) {
                alert('Участник с таким ID не найден!');
                return;
            }

            // Обновить данные
            members[index] = { id, name, age, membership };
            renderTable();
            clearForm();
            alert('Данные участника обновлены!');
        });

        // Удаление участника
        document.getElementById('delete-btn').addEventListener('click', () => {
            const id = parseInt(idInput.value.trim());
            if (!id || isNaN(id)) {
                alert('Введите ID участника, которого хотите удалить.');
                return;
            }

            const index = members.findIndex(m => m.id === id);
            if (index === -1) {
                alert('Участник с таким ID не найден!');
                return;
            }

            if (confirm('Вы уверены, что хотите удалить этого участника?')) {
                members.splice(index, 1);
                renderTable();
                clearForm();
                alert('Участник удалён.');
            }
        });

        // Очистить поля
        document.getElementById('clear-btn').addEventListener('click', clearForm);
    </script>
</body>
</html>
