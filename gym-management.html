<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сухарик • Терминатор</title>
    <!-- Шрифт с терминальным характером -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Базовые цвета как в фильме */
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0a0a;
            background-image: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #000000 100%);
        }
        .metal-panel {
            background: linear-gradient(145deg, #1e1e1e 0%, #0c0c0c 100%);
            border: 1px solid #3a3a3a;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2), inset 0 0 10px rgba(0,0,0,0.8);
        }
        .red-glow {
            text-shadow: 0 0 8px #ff0000, 0 0 12px #990000;
            color: #ffcccc;
        }
        .red-border {
            border: 1px solid #b30000;
            box-shadow: 0 0 10px #ff000080;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-family: 'Share Tech Mono', monospace;
        }
        th {
            background: #2a0a0a;
            color: #ff6666;
            border: 1px solid #8b0000;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px #ff0000;
        }
        td {
            border: 1px solid #330000;
            padding: 8px;
            color: #ffb3b3;  /* светлый красноватый */
            background: rgba(0,0,0,0.6);
        }
        tr:nth-child(even) td {
            background: rgba(20,0,0,0.5);
        }
        tr:hover td {
            background: #3a0a0a;
            color: white;
        }
        input, select {
            background: #111 !important;
            border: 1px solid #a00 !important;
            color: #ffcccc !important;  /* светлый текст */
            font-family: 'Share Tech Mono', monospace;
        }
        input::placeholder {
            color: #aa5555;  /* placeholder чуть темнее, но видимый */
            opacity: 0.8;
        }
        input:focus, select:focus {
            ring-color: #f00 !important;
            border-color: #f00 !important;
            box-shadow: 0 0 15px #f00 !important;
        }
        button {
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.2s;
        }
        .btn-terminator {
            background: linear-gradient(145deg, #3d0000, #1a0000);
            border: 1px solid #8b0000;
            color: #ffb3b3;
            box-shadow: 0 0 12px #ff0000b3;
        }
        .btn-terminator:hover {
            background: linear-gradient(145deg, #5e0000, #2b0000);
            color: white;
            border-color: #ff4d4d;
            box-shadow: 0 0 20px #ff0000;
            transform: scale(1.02);
        }
        .glitch {
            animation: glitch 1.5s infinite;
        }
        @keyframes glitch {
            0% { text-shadow: 2px 0 red, -2px 0 blue; }
            20% { text-shadow: -2px 0 red, 2px 0 blue; }
            40% { text-shadow: 2px 0 red, -2px 0 blue; }
            60% { text-shadow: -2px 0 cyan, 2px 0 magenta; }
            80% { text-shadow: 2px 0 magenta, -2px 0 cyan; }
            100% { text-shadow: 2px 0 red, -2px 0 blue; }
        }
        .header-metal {
            background: linear-gradient(145deg, #2a2a2a, #0f0f0f);
            border-bottom: 3px solid #a00;
            position: relative;
        }
        .header-metal::after {
            content: "";
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f00, #f00, transparent);
        }
        /* Улучшенная читаемость фонового текста */
        .footer-text {
            color: #ff8888;
            text-shadow: 0 0 5px #f00;
        }
        .subheader {
            color: #ffa0a0;
            text-shadow: 0 0 8px #b00;
        }
        .cyber-year {
            color: #cc6666;
            text-shadow: 0 0 4px #900;
        }
        .section-title {
            color: #ff6666;
            text-shadow: 0 0 10px #f00, 0 0 20px #900;
            border-bottom: 1px solid #8b0000;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="min-h-screen p-4 flex items-center justify-center">
    <div class="max-w-7xl w-full mx-auto metal-panel rounded-xl overflow-hidden">
        <!-- Шапка в стиле Терминатора -->
        <div class="header-metal p-6 text-center relative">
            <h1 class="text-5xl font-bold red-glow glitch" style="font-family: 'Share Tech Mono', monospace;">⚡ СУХАРИК ⚡</h1>
            <p class="subheader mt-2 tracking-widest text-lg">[ ФИТНЕС-КЛУБ БУДУЩЕГО ]</p>
            <p class="cyber-year text-xs mt-1">CYBERDYNE SYSTEMS © 2029</p>
        </div>

        <!-- Основной контент -->
        <div class="p-6 bg-black bg-opacity-70">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Левая колонка: форма ввода -->
                <div class="metal-panel p-6 rounded-lg">
                    <h2 class="section-title text-2xl font-bold mb-4 pb-2">:: ДАННЫЕ ЮНИТА ::</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-red-300 mb-1 uppercase tracking-wider">ID (серийный номер)</label>
                            <input type="number" id="member-id" class="w-full px-4 py-2 rounded-md transition" placeholder="например 101">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-red-300 mb-1 uppercase tracking-wider">Имя (позывной)</label>
                            <input type="text" id="member-name" class="w-full px-4 py-2 rounded-md transition" placeholder="T-800">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-red-300 mb-1 uppercase tracking-wider">Возраст (циклов)</label>
                            <input type="number" id="member-age" class="w-full px-4 py-2 rounded-md transition" placeholder="35">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-red-300 mb-1 uppercase tracking-wider">Тип абонемента</label>
                            <select id="member-membership" class="w-full px-4 py-2 rounded-md transition">
                                <option value="Monthly">Monthly (стандарт)</option>
                                <option value="Quarterly">Quarterly (тактический)</option>
                                <option value="Yearly">Yearly (стратегический)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Кнопки управления -->
                    <div class="flex flex-wrap gap-3 mt-6">
                        <button id="add-btn" class="btn-terminator px-6 py-2 rounded-md font-bold">+ Добавить</button>
                        <button id="update-btn" class="btn-terminator px-6 py-2 rounded-md font-bold">⟲ Обновить</button>
                        <button id="delete-btn" class="btn-terminator px-6 py-2 rounded-md font-bold">✖ Удалить</button>
                        <button id="clear-btn" class="btn-terminator px-6 py-2 rounded-md font-bold">❄ Очистить</button>
                    </div>
                </div>

                <!-- Правая колонка: таблица -->
                <div class="metal-panel p-6 rounded-lg">
                    <h2 class="section-title text-2xl font-bold mb-4 pb-2">:: АКТИВНЫЕ ЮНИТЫ ::</h2>
                    <div class="overflow-x-auto" style="max-height: 350px; overflow-y: auto;">
                        <table class="min-w-full">
                            <thead>
                                <tr>
                                    <th class="px-4 py-2">ID</th>
                                    <th class="px-4 py-2">Имя</th>
                                    <th class="px-4 py-2">Возраст</th>
                                    <th class="px-4 py-2">Абонемент</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <!-- строки добавляются скриптом -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Подвал -->
        <div class="bg-black p-4 text-center border-t border-red-900">
            <p class="footer-text text-xs">[ Система управления фитнес-клубом v.2029.1 ]</p>
            <p class="footer-text text-xs mt-1">«I'll be back» — для продолжения работы нажми любую кнопку</p>
        </div>
    </div>

    <script>
        // Массив с членами клуба
        let members = [];

        const idInput = document.getElementById('member-id');
        const nameInput = document.getElementById('member-name');
        const ageInput = document.getElementById('member-age');
        const membershipSelect = document.getElementById('member-membership');
        const tableBody = document.getElementById('table-body');

        function renderTable() {
            tableBody.innerHTML = '';
            members.forEach((member, index) => {
                const row = document.createElement('tr');
                row.classList.add('cursor-pointer', 'hover:bg-red-900');
                row.setAttribute('data-index', index);
                row.innerHTML = `
                    <td class="px-4 py-2">${member.id}</td>
                    <td class="px-4 py-2">${member.name}</td>
                    <td class="px-4 py-2">${member.age}</td>
                    <td class="px-4 py-2">${member.membership}</td>
                `;
                row.addEventListener('click', () => fillForm(index));
                tableBody.appendChild(row);
            });
        }

        function fillForm(index) {
            const member = members[index];
            idInput.value = member.id;
            nameInput.value = member.name;
            ageInput.value = member.age;
            membershipSelect.value = member.membership;
            idInput.disabled = true;
        }

        function clearForm() {
            idInput.value = '';
            nameInput.value = '';
            ageInput.value = '';
            membershipSelect.selectedIndex = 0;
            idInput.disabled = false;
        }

        document.getElementById('add-btn').addEventListener('click', () => {
            const id = parseInt(idInput.value.trim());
            const name = nameInput.value.trim();
            const age = parseInt(ageInput.value.trim());
            const membership = membershipSelect.value;

            if (!id || !name || !age || isNaN(id) || isNaN(age)) {
                alert('Заполните все поля, юнит!');
                return;
            }
            if (members.some(m => m.id === id)) {
                alert('Юнит с таким ID уже существует!');
                return;
            }
            members.push({ id, name, age, membership });
            renderTable();
            clearForm();
            alert('Юнит добавлен в базу.');
        });

        document.getElementById('update-btn').addEventListener('click', () => {
            const id = parseInt(idInput.value.trim());
            const name = nameInput.value.trim();
            const age = parseInt(ageInput.value.trim());
            const membership = membershipSelect.value;

            if (!id || !name || !age || isNaN(id) || isNaN(age)) {
                alert('Заполните поля корректно!');
                return;
            }
            const index = members.findIndex(m => m.id === id);
            if (index === -1) {
                alert('Юнит не найден!');
                return;
            }
            members[index] = { id, name, age, membership };
            renderTable();
            clearForm();
            alert('Данные юнита обновлены.');
        });

        document.getElementById('delete-btn').addEventListener('click', () => {
            const id = parseInt(idInput.value.trim());
            if (!id || isNaN(id)) {
                alert('Введите ID юнита для удаления.');
                return;
            }
            const index = members.findIndex(m => m.id === id);
            if (index === -1) {
                alert('Юнит не найден!');
                return;
            }
            if (confirm('Приказ на уничтожение? Удалить юнита?')) {
                members.splice(index, 1);
                renderTable();
                clearForm();
                alert('Юнит стёрт из базы.');
            }
        });

        document.getElementById('clear-btn').addEventListener('click', clearForm);
    </script>
</body>
</html>
